name: Keep Streamlit App Awake

on:
  schedule:
    # Run every 15 minutes to avoid inactivity sleep.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$STREAMLIT_APP_URL" ]; then
            echo "STREAMLIT_APP_URL secret is not set."
            exit 1
          fi

          echo "Pinging $STREAMLIT_APP_URL"
          curl --silent --show-error --location --fail \
            --retry 3 --retry-delay 5 --max-time 30 \
            "$STREAMLIT_APP_URL" > /dev/null
